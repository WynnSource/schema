edition = "2023";
package wynnsource.item;

option java_package = "fyw.fyi.wynnsource.schema.item";

enum CorkianAugmentType {
  CORKIAN_AUGMENT_TYPE_UNSPECIFIED = 0;
  CORKIAN_AUGMENT_TYPE_AMPLIFIER = 1;
  CORKIAN_AUGMENT_TYPE_SIMULATOR = 2;
  CORKIAN_AUGMENT_TYPE_INSULATOR = 3;
}

message CorkianAugment {
  CorkianAugmentType type = 1;
  int32 tier = 2;
}
