edition = "2023";
package wynnsource.item;

import "wynnsource/common/components.proto";
import "wynnsource/common/enums.proto";

option java_package = "fyw.fyi.wynnsource.schema.item";

message ModifierPos {
  int32 x = 1;
  int32 y = 2;
}

message Modifier {
  ModifierPos pos = 1;
  int32 value = 2;
}

message ReqModifier {
  int32 strength_req = 3;
  int32 dexterity_req = 4;
  int32 intelligence_req = 5;
  int32 defense_req = 6;
  int32 agility_req = 7;
}

message Ingredient {
  int32 durability = 1;
  int32 duration = 2;
  int32 charges = 3;
  wynnsource.common.IngredientRarity rarity = 4;
  repeated wynnsource.common.CraftedEffect effects = 5;
  repeated wynnsource.common.Profession professions = 6;
  repeated Modifier modifiers = 7;
  ReqModifier req_modifier = 8;
}
