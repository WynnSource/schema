edition = "2023";
package wynnsource.item;

option java_package = "fyw.fyi.wynnsource.schema.item";

enum MountType {
  MOUNT_TYPE_UNSPECIFIED = 0;
  MOUNT_TYPE_HORSE = 1;
  MOUNT_TYPE_WYVERN = 2;
  MOUNT_TYPE_ADASAUR = 3;
}

message MountStats {
  string stat_name = 1;
  int32 current = 2;
  int32 limit = 3;
  int32 max = 4;
}

message Mount {
  MountType mount_type = 1;
  int32 potency = 2;
  string color = 3;

  repeated MountStats stats = 11;
}
